name: Backfill Venues from Google Scholar

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r markdown_generator/requirements-scholar.txt

      - name: Run venue backfill
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python markdown_generator/venue_backfill.py \
            --use-proxy \
            --delay 10 \
            --verbose

      - name: Commit and push if changed
        run: |
          git diff --quiet _data/publications.yml && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml
          git commit -m "Backfill venues from Google Scholar"
          git push
